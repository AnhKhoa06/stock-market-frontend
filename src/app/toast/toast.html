<div class="toast-container">
  <div
    *ngFor="let toast of toasts"
    class="toast"
    [ngClass]="[toast.type, isRemoving(toast.id) ? 'slide-out' : '']"
  >
    <div class="toast-icon">
      <span *ngIf="toast.type === 'success'">✓</span>
      <span *ngIf="toast.type === 'error'">✕</span>
    </div>
    <div class="toast-body">
      <span class="toast-title">{{ toast.type === 'success' ? 'Thành công' : 'Lỗi' }}</span>
      <span class="toast-message">{{ toast.message }}</span>
    </div>
    <button class="toast-close" (click)="remove(toast.id)">✕</button>
    <div class="progress-bar">
      <div class="progress" [ngClass]="toast.type"></div>
    </div>
  </div>
</div>

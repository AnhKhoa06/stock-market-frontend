<div class="profile-page">
  <div class="profile-header">
    <p class="profile-label">TÀI KHOẢN</p>
    <h1 class="profile-title">Hồ Sơ</h1>
    <p class="profile-subtitle">Thông tin tài khoản cơ bản.</p>
  </div>

  <div class="profile-card">
    <div class="profile-top">
      <div class="avatar">{{ avatarLetter }}</div>
      <div class="profile-info">
        <h2>{{ username }}</h2>
        <p>Người dùng tiêu chuẩn</p>
      </div>
    </div>

    <div class="profile-details">
      <div class="detail-box">
        <div class="detail-label">
          <mat-icon>person</mat-icon>
          <span>Tên người dùng</span>
        </div>
        <p class="detail-value">{{ username }}</p>
      </div>

      <div class="detail-box">
        <div class="detail-label">
          <mat-icon>bar_chart</mat-icon>
          <span>Trạng thái</span>
        </div>
        <p class="detail-value">Đã xác thực</p>
      </div>
    </div>
  </div>
</div>
